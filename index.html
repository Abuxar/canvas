<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Whiteboard - Infinite Canvas</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { getStroke } from 'https://cdn.skypack.dev/perfect-freehand';
    window.getStroke = getStroke;
  </script>
  
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --glass-active: rgba(99, 102, 241, 0.3);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --blur: blur(20px);
      --blur-heavy: blur(40px);
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
    }

    * {
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 50%, #0f0c29 0%, #1a0533 30%, #0d1117 60%, #020408 100%);
      color: white;
      touch-action: none; /* Prevent browser zoom/pan on mobile */
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .glass-heavy {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: var(--blur-heavy);
      -webkit-backdrop-filter: var(--blur-heavy);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes glow-pulse {
      from { box-shadow: 0 0 10px var(--accent-glow); }
      to { box-shadow: 0 0 25px var(--accent-glow); }
    }
    @keyframes slide-in-left {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slide-in-right {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slide-in-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scale-in {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes scale-out {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(0.95); opacity: 0; }
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }
    @keyframes progress-fill {
      from { width: 0%; }
      to { width: 100%; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .anim-float { animation: float 3s ease-in-out infinite; }
    .anim-glow { animation: glow-pulse 2s alternate infinite; }
    .anim-fade-in { animation: fade-in 0.25s ease forwards; }
    .anim-scale-in { animation: scale-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .anim-spin { animation: spin 1s linear infinite; }

    #bg-canvas, #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    #bg-canvas {
      z-index: 0;
      pointer-events: none;
    }
    #canvas {
      z-index: 1;
      touch-action: none;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: radial-gradient(ellipse at 20% 50%, #0f0c29 0%, #1a0533 30%, #0d1117 60%, #020408 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <canvas id="canvas"></canvas>

  <div id="loading-screen">
    <div class="glass-heavy flex flex-col items-center" style="border-radius: 32px; padding: 48px 56px;">
      <div class="anim-float anim-glow mb-6 flex items-center justify-center font-bold text-3xl" 
           style="width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, #4f46e5, #9333ea);">
        W
      </div>
      <h1 class="text-2xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Whiteboard</h1>
      <p class="text-gray-400 text-sm mb-6">Infinite canvas. Zero limits.</p>
      
      <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden mb-3">
        <div id="loading-progress" class="h-full bg-indigo-500 rounded-full" style="animation: progress-fill 1.2s ease-out forwards;"></div>
      </div>
      <p id="loading-status" class="text-xs text-gray-500 font-mono">Initializing canvas...</p>
    </div>
  </div>

  <!-- UI Container z-index 10 -->
  <div id="ui-container" class="fixed inset-0 pointer-events-none z-10" style="opacity: 0; transition: opacity 0.5s ease;">
    


    <!-- Context Toolbar -->
    <div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-1 pointer-events-auto glass-heavy rounded-full p-1" style="top: 64px;">
      <button id="btn-undo" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3l-3 2.7"></path></svg></button>
      <button id="btn-redo" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg></button>
      <div class="w-px h-4 bg-white/10 mx-1"></div>
      <button id="btn-align-left" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Align Left"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="22" x2="4" y2="2"></line><rect x="8" y="6" width="12" height="4"></rect><rect x="8" y="14" width="8" height="4"></rect></svg></button>
      <button id="btn-align-center" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Align Center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="22" x2="12" y2="2"></line><rect x="6" y="6" width="12" height="4"></rect><rect x="8" y="14" width="8" height="4"></rect></svg></button>
      <button id="btn-align-right" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Align Right"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="20" y1="22" x2="20" y2="2"></line><rect x="4" y="6" width="12" height="4"></rect><rect x="8" y="14" width="8" height="4"></rect></svg></button>
      <div class="w-px h-4 bg-white/10 mx-1"></div>
      <button id="btn-group" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Group (Ctrl+G)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
      <button id="btn-ungroup" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors" title="Ungroup (Ctrl+Shift+G)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="14" y="14" width="7" height="7"></rect><path d="M3 3h7v7H3z"></path></svg></button>
      <div class="w-px h-4 bg-white/10 mx-1"></div>
      <button id="btn-delete" class="w-8 h-8 rounded-full flex items-center justify-center text-red-400 hover:text-red-300 hover:bg-red-500/20 transition-colors" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
    </div>

    <!-- Left Toolbar -->
    <div id="left-toolbar" class="absolute left-0 top-1/2 -translate-y-1/2 ml-4 flex flex-col items-center p-2 gap-1 rounded-[20px] pointer-events-auto glass-heavy shadow-2xl max-h-[calc(100vh-120px)] overflow-y-auto" style="scrollbar-width: none;">
      <!-- Tools will be injected here via JS to avoid huge HTML blocks -->
    </div>

    <!-- Right Properties Panel -->
    <aside id="properties-panel" class="absolute right-0 w-[264px] rounded-l-[20px] pointer-events-auto glass-heavy flex flex-col overflow-y-auto z-40" style="top: 56px; bottom: 36px;">
      <div class="p-4 border-b border-white/5 disabled-group text-sm">
        <label class="block text-gray-300 mb-2 font-medium">Stroke Color</label>
        <div class="flex items-center gap-2 mb-3">
          <label class="w-9 h-7 rounded bg-indigo-500 cursor-pointer overflow-hidden border border-white/20 shadow-inner flex-shrink-0 relative">
            <input type="color" id="prop-stroke" class="absolute opacity-0 w-10 h-10 -top-2 -left-2 cursor-pointer" value="#6366f1">
          </label>
          <div class="flex gap-1.5 flex-wrap">
            <button class="color-swatch w-5 h-5 rounded-sm bg-white border border-white/20 hover:scale-110 transition-transform" data-color="#ffffff"></button>
            <button class="color-swatch w-5 h-5 rounded-sm bg-gray-500 border border-white/20 hover:scale-110 transition-transform" data-color="#6b7280"></button>
            <button class="color-swatch w-5 h-5 rounded-sm bg-red-500 border border-white/20 hover:scale-110 transition-transform" data-color="#ef4444"></button>
            <button class="color-swatch w-5 h-5 rounded-sm bg-amber-500 border border-white/20 hover:scale-110 transition-transform" data-color="#f59e0b"></button>
            <button class="color-swatch w-5 h-5 rounded-sm bg-green-500 border border-white/20 hover:scale-110 transition-transform" data-color="#10b981"></button>
            <button class="color-swatch w-5 h-5 rounded-sm bg-indigo-500 border border-white/20 hover:scale-110 transition-transform" data-color="#6366f1"></button>
            <label class="w-5 h-5 rounded-sm cursor-pointer hover:scale-110 transition-transform overflow-hidden relative border border-white/20" title="More Colors (RGB)" style="background: conic-gradient(from 180deg at 50% 50%, #f00 0deg, #ff0 60deg, #0f0 120deg, #0ff 180deg, #00f 240deg, #f0f 300deg, #f00 360deg);">
              <input type="color" id="prop-stroke-custom" class="absolute opacity-0 w-10 h-10 -top-2 -left-2 cursor-pointer" value="#ffffff">
            </label>
          </div>
        </div>
      </div>
    </aside>

    <!-- Top Nav moved to follow properties-panel for natural top-stacking -->
    <header class="glass absolute top-0 left-0 right-0 z-[999] pointer-events-auto flex items-center justify-between px-4" style="height: 56px;">
      <div class="flex items-center gap-3">
        <div class="anim-glow flex items-center justify-center font-bold text-white shadow-lg" 
             style="width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #4f46e5, #9333ea);">
          W
        </div>
        <div class="font-semibold text-white tracking-wide">Whiteboard</div>
        <div class="glass-heavy text-xs px-2 py-0.5 rounded-full font-mono text-indigo-300">v1.0</div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex -space-x-2">
          <div class="w-7 h-7 rounded-full border border-indigo-500/30 flex items-center justify-center text-xs font-bold bg-gradient-to-br from-indigo-500 to-purple-600 relative">
            A
            <div class="absolute bottom-0 right-0 w-2 h-2 bg-green-400 rounded-full border border-gray-900 anim-pulse-dot"></div>
          </div>
          <div class="w-7 h-7 rounded-full border border-cyan-500/30 flex items-center justify-center text-xs font-bold bg-gradient-to-br from-cyan-500 to-blue-600">M</div>
          <div class="w-7 h-7 rounded-full border border-amber-500/30 flex items-center justify-center text-xs font-bold bg-gradient-to-br from-amber-500 to-orange-600">J</div>
        </div>
        <div class="w-px h-6 bg-white/10"></div>
        <button id="btn-share" class="glass-heavy w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-white">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        </button>
        <div class="relative group">
          <button id="btn-export" class="glass-heavy w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-white relative z-10">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          
          <!-- Dropdown Menu -->
          <div class="absolute right-0 top-full mt-3 w-64 rounded-2xl p-1.5 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all z-[1000] shadow-[0_20px_50px_rgba(0,0,0,1)] border border-white/20 origin-top-right transform group-hover:scale-100 scale-95 duration-200 bg-[#0d1117]">
            <div class="px-4 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-[2px] border-b border-white/5 mb-1.5">Export Project</div>
            
            <button id="btn-export-png" class="w-full text-left px-3 py-3 text-sm text-gray-300 hover:text-white hover:bg-white/5 rounded-xl transition-all flex items-center justify-between group/item">
              <span class="flex items-center gap-4">
                <span class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-[11px] font-black text-indigo-400 border border-indigo-500/20 shadow-inner">PNG</span>
                <span class="font-semibold tracking-tight text-gray-100">Image (Transparent)</span>
              </span>
            </button>
            
            <button id="btn-export-jpeg" class="w-full text-left px-3 py-3 text-sm text-gray-300 hover:text-white hover:bg-white/5 rounded-xl transition-all flex items-center justify-between group/item">
              <span class="flex items-center gap-4">
                <span class="w-10 h-10 rounded-xl bg-blue-600/20 flex items-center justify-center text-[11px] font-black text-blue-400 border border-blue-500/20 shadow-inner">JPG</span>
                <span class="font-semibold tracking-tight text-gray-100">Flat Photo</span>
              </span>
            </button>
            
            <button id="btn-export-svg" class="w-full text-left px-3 py-3 text-sm text-gray-300 hover:text-white hover:bg-white/5 rounded-xl transition-all flex items-center justify-between group/item">
              <span class="flex items-center gap-4">
                <span class="w-10 h-10 rounded-xl bg-orange-600/20 flex items-center justify-center text-[11px] font-black text-orange-400 border border-orange-500/20 shadow-inner">SVG</span>
                <span class="font-semibold tracking-tight text-gray-100">Vector Illustration</span>
              </span>
            </button>
            
            <div class="h-px bg-white/5 my-2 mx-3"></div>
            
            <button id="btn-export-json" class="w-full text-left px-3 py-3 text-sm text-gray-300 hover:text-white hover:bg-white/10 rounded-xl transition-all flex items-center justify-between group/item">
              <span class="flex items-center gap-4">
                <span class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center text-[11px] font-black text-emerald-400 border border-emerald-500/20 shadow-inner">JSON</span>
                <span class="font-semibold tracking-tight">Project Source File</span>
              </span>
            </button>
          </div>
        </div>
        <button id="btn-settings" class="glass-heavy w-9 h-9 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-white">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </header>
        
        <label class="block text-gray-300 mb-2 mt-4 font-medium">Fill Color</label>
        <div class="flex items-center gap-2">
          <label class="w-9 h-7 rounded bg-transparent cursor-pointer overflow-hidden border border-white/20 shadow-inner flex-shrink-0 relative" style="background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 10px 10px; background-position: 0 0, 0 5px, 5px -5px, -5px 0px;">
            <input type="color" id="prop-fill" class="absolute opacity-0 w-10 h-10 -top-2 -left-2 cursor-pointer" value="#000000">
          </label>
          <button id="prop-fill-clear" class="flex-1 text-xs bg-white/5 hover:bg-white/10 py-1.5 rounded border border-white/10 transition-colors">Transparent</button>
          <label class="w-7 h-7 rounded-sm cursor-pointer hover:scale-110 transition-transform overflow-hidden relative border border-white/20 flex-shrink-0" title="More Colors (RGB)" style="background: conic-gradient(from 180deg at 50% 50%, #f00 0deg, #ff0 60deg, #0f0 120deg, #0ff 180deg, #00f 240deg, #f0f 300deg, #f00 360deg);">
             <input type="color" id="prop-fill-custom" class="absolute opacity-0 w-10 h-10 -top-2 -left-2 cursor-pointer" value="#ffffff">
          </label>
        </div>
      </div>
      
      <div class="p-4 border-b border-white/5 disabled-group text-sm">
        <div class="flex justify-between mb-2">
          <label class="text-gray-300 font-medium">Stroke Width</label>
          <span id="prop-width-val" class="text-gray-400 font-mono text-xs">2px</span>
        </div>
        <input type="range" id="prop-width" min="1" max="50" value="2" class="w-full appearance-none bg-white/10 h-1 rounded-full outline-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-indigo-400 [&::-webkit-slider-thumb]:rounded-full cursor-pointer">
      </div>
      
      <div id="prop-section-text" class="p-4 border-b border-white/5 disabled-group text-sm" style="display: none;">
        <label class="block text-gray-300 mb-2 font-medium">Font Family</label>
        <select id="prop-font-family" class="w-full bg-white/10 border border-white/20 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-1.5 outline-none mb-3">
          <option value="Inter" class="bg-gray-800">Inter</option>
          <option value="JetBrains Mono" class="bg-gray-800">JetBrains Mono</option>
          <option value="Arial" class="bg-gray-800">Arial</option>
          <option value="'Times New Roman'" class="bg-gray-800">Times New Roman</option>
          <option value="'Comic Sans MS'" class="bg-gray-800">Comic Sans MS</option>
        </select>
        <div class="flex gap-2 mb-3">
          <input type="number" id="prop-font-size" value="24" min="8" max="144" class="w-16 bg-white/10 border border-white/20 text-white text-sm rounded outline-none px-2 py-1 text-center font-mono">
          <div class="flex flex-1 rounded overflow-hidden relative">
            <button id="prop-font-bold" class="flex-1 bg-white/5 border border-white/20 hover:bg-white/10 text-gray-400 font-bold transition-colors">B</button>
            <button id="prop-font-italic" class="flex-1 bg-white/5 border border-white/20 border-l-0 hover:bg-white/10 text-gray-400 italic font-serif transition-colors">I</button>
          </div>
        </div>
      </div>
      
      <div class="p-4 border-b border-white/5 disabled-group text-sm">
        <label class="block text-gray-300 mb-2 font-medium">Dash Style</label>
        <div class="flex gap-2">
          <button class="dash-btn flex-1 py-1 rounded border border-indigo-500 bg-indigo-500/20 text-white" data-dash="solid">Solid</button>
          <button class="dash-btn flex-1 py-1 rounded border border-white/10 hover:bg-white/5 text-gray-400" data-dash="dashed">Dash</button>
          <button class="dash-btn flex-1 py-1 rounded border border-white/10 hover:bg-white/5 text-gray-400" data-dash="dotted">Dot</button>
