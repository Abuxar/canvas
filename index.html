      resize() {
        this.canvas.width = window.innerWidth * this.dpr;
        this.canvas.height = window.innerHeight * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
        this.markDirty();
      }
      
      screenToWorld(sx, sy) {
        return {
          x: (sx / this.dpr - this.viewport.x) / this.viewport.zoom,
          y: (sy / this.dpr - this.viewport.y) / this.viewport.zoom
        };
      }
      
      worldToScreen(wx, wy) {
        return {
          x: (wx * this.viewport.zoom + this.viewport.x) * this.dpr,
          y: (wy * this.viewport.zoom + this.viewport.y) * this.dpr
        };
      }
      
      render() {
        if (this.isDirty) {
          this.ctx.clearRect(0, 0, this.canvas.width / this.dpr, this.canvas.height / this.dpr);
          
          this.ctx.save();
          this.ctx.setTransform(this.viewport.zoom * this.dpr, 0, 0, this.viewport.zoom * this.dpr, this.viewport.x * this.dpr, this.viewport.y * this.dpr);
          
          // Render Grid
          this.gridRenderer.render(this.ctx);
          
          // Render Elements
          const elements = this.board.getAllElements();
          for (const el of elements) {
            this.ctx.save();
            this.ctx.globalAlpha = el.opacity !== undefined ? el.opacity : 1;
            if (el.rotation) {
              const cx = el.x + el.width/2;
              const cy = el.y + el.height/2;
              this.ctx.translate(cx, cy);
              this.ctx.rotate(el.rotation);
              this.ctx.translate(-cx, -cy);
            }
            el.render(this.ctx);
            this.ctx.restore();
          }

          // Render active tool preview
          const tool = this.toolManager.getActiveTool();
          if (tool && tool.onRender) {
            tool.onRender(this.ctx);
          }
          
          // Render selection
          
          // Render snap guidelines
          if (this.snapLines && this.snapLines.length > 0) {
            this.ctx.save();
            this.ctx.lineWidth = 1 / this.viewport.zoom;
            this.ctx.strokeStyle = 'rgba(99, 102, 241, 0.6)';
            this.ctx.beginPath();
            for (const line of this.snapLines) {
              this.ctx.moveTo(line.x1, line.y1);
              this.ctx.lineTo(line.x2, line.y2);
            }
            this.ctx.stroke();
            this.ctx.restore();
          }

          this.ctx.restore();
          
          // Render screen-space overlays (minimap, cursors, etc)
          this.isDirty = false;
        }
        requestAnimationFrame(this.render);
      }
      

    }

    // System Initialization & Logic
    let engine;
    const initApp = () => {
      new AmbientBackground('bg-canvas');
      engine = new CanvasEngine('canvas');
      window.whiteboardEngine = engine; // Expose globally for console debugging
      
      engine.loadFromIndexedDB();
      
      const minimapHeader = document.getElementById('minimap-header');
      const minimapContent = document.getElementById('minimap-content');
      const minimapIcon = document.getElementById('minimap-icon');
      let isMinimapOpen = true;
      
      minimapHeader.onclick = () => {
        isMinimapOpen = !isMinimapOpen;
        if (isMinimapOpen) {
          minimapContent.style.height = '124px';
          minimapIcon.style.transform = 'rotate(0deg)';
        } else {
          minimapContent.style.height = '0px';
          minimapIcon.style.transform = 'rotate(180deg)';
        }
      };
      
      document.getElementById('btn-export-json').onclick = () => {
         const data = engine.board.toJSON();
         const blob = new Blob([data], {type: 'application/json'});
         const url = URL.createObjectURL(blob);
         const a = document.createElement('a');
         a.href = url; a.download = 'whiteboard.json';
         a.click();
         URL.revokeObjectURL(url);
         engine.showToast('Project saved as JSON', 'success');
      };
      
      const downloadExport = (format) => {
         // Create a temporary canvas for exporting
         const exportCanvas = document.createElement('canvas');
         exportCanvas.width = engine.canvas.width;
         exportCanvas.height = engine.canvas.height;
         const exportCtx = exportCanvas.getContext('2d', { alpha: format === 'image/png' });
         
         if (format === 'image/jpeg') {
            exportCtx.fillStyle = '#0d1117'; // Set background color since JPEG has no alpha
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
         }
         
         // Setup viewport transform (zoom/pan) exactly as visible on screen
         exportCtx.translate(exportCanvas.width / 2, exportCanvas.height / 2);
         exportCtx.scale(engine.viewport.zoom, engine.viewport.zoom);
         exportCtx.translate(-engine.viewport.x, -engine.viewport.y);
         
         // Render the board elements (without UI, guides, grid, etc)
         engine.board.render(exportCtx);
         
         exportCanvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `whiteboard_export.${format === 'image/png' ? 'png' : 'jpg'}`;
            a.click();
            URL.revokeObjectURL(url);
            engine.showToast(`Exported as ${format === 'image/png' ? 'PNG' : 'JPEG'}`, 'success');
         }, format, 0.95);
      };
      
      document.getElementById('btn-export-png').onclick = () => downloadExport('image/png');
      document.getElementById('btn-export-jpeg').onclick = () => downloadExport('image/jpeg');
      
      document.getElementById('btn-export-svg').onclick = () => {
         // Basic SVG export mapping shapes and text
         engine.showToast('Generating Vector SVG...', 'info');
         let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${engine.canvas.width}" height="${engine.canvas.height}">`;
         
         // Create an SVG group scaled and translated to viewport
         svgContent += `<g transform="translate(${engine.canvas.width/2}, ${engine.canvas.height/2}) scale(${engine.viewport.zoom}) translate(-${engine.viewport.x}, -${engine.viewport.y})">`;
         
         const els = engine.board.getAllElements();
         for(const el of els) {
            const rot = el.rotation ? ` transform="rotate(${(el.rotation * 180)/Math.PI} ${el.x + el.width/2} ${el.y + el.height/2})"` : '';
            const opacity = el.opacity !== undefined ? ` opacity="${el.opacity}"` : '';
            
            if (el.type === 'rect') {
              const dash = el.dashStyle && el.dashStyle.length ? ` stroke-dasharray="${el.dashStyle.join(',')}"` : '';
              svgContent += `<rect x="${el.x}" y="${el.y}" width="${el.width}" height="${el.height}" fill="${el.fillColor}" stroke="${el.strokeColor}" stroke-width="${el.strokeWidth}" rx="${el.borderRadius || 0}"${rot}${opacity}${dash} />`;
            } else if (el.type === 'ellipse') {
              const dash = el.dashStyle && el.dashStyle.length ? ` stroke-dasharray="${el.dashStyle.join(',')}"` : '';
              svgContent += `<ellipse cx="${el.x + el.width/2}" cy="${el.y + el.height/2}" rx="${el.width/2}" ry="${el.height/2}" fill="${el.fillColor}" stroke="${el.strokeColor}" stroke-width="${el.strokeWidth}"${rot}${opacity}${dash} />`;
            } else if (el.type === 'text') {
              svgContent += `<text x="${el.x}" y="${el.y + el.fontSize}" font-family="${el.fontFamily}" font-size="${el.fontSize}" fill="${el.strokeColor}" font-weight="${el.fontWeight || 400}" font-style="${el.fontStyle || 'normal'}"${rot}${opacity}>${el.text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</text>`;
            } else if (el.type === 'line' || el.type === 'arrow') {
               const dash = el.dashStyle && el.dashStyle.length ? ` stroke-dasharray="${el.dashStyle.join(',')}"` : '';
               svgContent += `<line x1="${el.x}" y1="${el.y}" x2="${el.x2}" y2="${el.y2}" stroke="${el.strokeColor}" stroke-width="${el.strokeWidth}" stroke-linecap="round"${opacity}${dash} />`;
            } else if (el.type === 'stroke') {
               // highly simplified path for freehand
               if(el.points && el.points.length > 0) {
                 let d = `M ${el.points[0].x} ${el.points[0].y}`;
                 for(let i=1; i<el.points.length; i++) d += ` L ${el.points[i].x} ${el.points[i].y}`;
                 svgContent += `<path d="${d}" stroke="${el.strokeColor}" stroke-width="${el.strokeWidth}" fill="none" stroke-linecap="round" stroke-linejoin="round"${opacity} />`;
               }
            } else if (el.type === 'sticky') {
               svgContent += `<rect x="${el.x}" y="${el.y}" width="${el.width}" height="${el.height}" fill="${el.noteColor}" stroke="rgba(0,0,0,0.1)" stroke-width="1" rx="8"${rot}${opacity} />`;
               svgContent += `<text x="${el.x + el.width/2}" y="${el.y + el.height/2}" font-family="Inter" font-size="16" fill="#1f2937" text-anchor="middle" dominant-baseline="middle"${rot}${opacity}>${(el.text||'').replace(/</g, "&lt;").replace(/>/g, "&gt;")}</text>`;
            }
         }
         
         svgContent += `</g></svg>`;
         
         const blob = new Blob([svgContent], {type: 'image/svg+xml'});
         const url = URL.createObjectURL(blob);
         const a = document.createElement('a');
         a.href = url; a.download = 'whiteboard_export.svg';
         a.click();
         URL.revokeObjectURL(url);
         engine.showToast('Exported Vector SVG', 'success');
      };
      
      document.getElementById('btn-share').onclick = () => {
         engine.showToast('Share link copied to clipboard', 'success');
      };
    };

    // Simulate loading screen
    window.addEventListener('load', () => {
      const statuses = ["Initializing canvas...", "Loading assets...", "Almost ready..."];
      const statusEl = document.getElementById('loading-status');
      
      setTimeout(() => statusEl.textContent = statuses[1], 400);
      setTimeout(() => statusEl.textContent = statuses[2], 900);
      
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
        
        setTimeout(() => {
          loader.style.display = 'none';
          document.getElementById('ui-container').style.opacity = '1';
          initApp();
        }, 500);
      }, 1400);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => {
          console.error('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
