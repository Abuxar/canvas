  <script>
    // --- Utilities ---
    const clamp = (val, min, max) => Math.min(Math.max(val, min), max);

    // --- Ambient Background System ---
    class AmbientBackground {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.orbs = [];
        this.colors = ['#4f46e5', '#7c3aed', '#0f766e', '#1d4ed8', '#6d28d9', '#0e7490'];
        this.init();
        
        window.addEventListener('resize', () => this.resize());
        this.resize();
        this.animate = this.animate.bind(this);
        requestAnimationFrame(this.animate);
      }
      
      init() {
        this.orbs = [];
        for (let i = 0; i < 60; i++) {
          this.orbs.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            radius: 80 + Math.random() * 200,
            color: this.colors[Math.floor(Math.random() * this.colors.length)],
            opacity: 0.03 + Math.random() * 0.05,
            opDir: Math.random() > 0.5 ? 1 : -1,
            opSpeed: 0.0005 + Math.random() * 0.001
          });
        }
      }

      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }

      animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (const orb of this.orbs) {
          orb.x += orb.vx;
          orb.y += orb.vy;
          
          if (orb.x < -orb.radius || orb.x > this.canvas.width + orb.radius) orb.vx *= -1;
          if (orb.y < -orb.radius || orb.y > this.canvas.height + orb.radius) orb.vy *= -1;
          
          orb.opacity += orb.opDir * orb.opSpeed;
          if (orb.opacity >= 0.08 || orb.opacity <= 0.03) orb.opDir *= -1;
          
          const grad = this.ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius);
          // extract rgb from hex
          const r = parseInt(orb.color.slice(1,3), 16);
          const g = parseInt(orb.color.slice(3,5), 16);
          const b = parseInt(orb.color.slice(5,7), 16);
          
          grad.addColorStop(0, `rgba(${r},${g},${b},${orb.opacity})`);
          grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
          
          this.ctx.fillStyle = grad;
          this.ctx.beginPath();
          this.ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
          this.ctx.fill();
        }
        
        requestAnimationFrame(this.animate);
      }
    }

    // --- Core Architecture System ---
    class Element {
      constructor() {
        this.id = crypto.randomUUID();
        this.type = 'base';
        this.x = 0;
        this.y = 0;
        this.width = 0;
        this.height = 0;
        this.rotation = 0;
        this.strokeColor = '#6366f1';
        this.fillColor = 'transparent';
        this.strokeWidth = 2;
        this.opacity = 1;
        this.dashStyle = [];
        this.locked = false;
        this.visible = true;
        this.layerId = null;
      }
      
      render(ctx) {}
      
      getBoundingBox() {
        return { x: this.x, y: this.y, width: this.width, height: this.height };
      }
      
      containsPoint(wx, wy) {
        let px = wx;
        let py = wy;
        if (this.rotation) {
          const cx = this.x + this.width/2;
          const cy = this.y + this.height/2;
          const dx = wx - cx;
          const dy = wy - cy;
          px = cx + dx * Math.cos(-this.rotation) - dy * Math.sin(-this.rotation);
          py = cy + dx * Math.sin(-this.rotation) + dy * Math.cos(-this.rotation);
        }
        const {x, y, width, height} = this.getBoundingBox();
        return px >= x && px <= x + width && py >= y && py <= y + height;
      }
      
      toJSON() {
        return { ...this };
      }
      static fromJSON(data) {
        let el;
        switch(data.type) {
          case 'stroke': el = new StrokeElement(); break;
          case 'rect': el = new RectElement(); break;
          case 'ellipse': el = new EllipseElement(); break;
          case 'line': el = new LineElement(); break;
          case 'arrow': el = new ArrowElement(); break;
          case 'text': el = new TextElement(); break;
          case 'sticky': el = new StickyElement(); break;
          case 'image': el = new ImageElement(); break;
          case 'frame': el = new FrameElement(); break;
          default: el = new Element();
        }
        Object.assign(el, data);
        if (el.type === 'image' && el.src) el.loadImage(el.src);
        return el;
      }
    }

    class StrokeElement extends Element {
      constructor() {
        super();
        this.type = 'stroke';
        this.points = [];
      }
      render(ctx) {
        if (this.points.length === 0 || !window.getStroke) return;
        const strokeData = window.getStroke(this.points, {
          size: this.strokeWidth * 2,
          thinning: this.dashStyle.includes('highlighter') ? 0 : 0.5,
          smoothing: 0.5,
          streamline: 0.5
        });
        if (strokeData.length === 0) return;
        
        ctx.beginPath();
        ctx.moveTo(strokeData[0][0], strokeData[0][1]);
        for (let i = 1; i < strokeData.length; i++) {
          ctx.lineTo(strokeData[i][0], strokeData[i][1]);
        }
        ctx.closePath();
        
        ctx.fillStyle = this.strokeColor;
        ctx.fill();
        
        // Handle bounding box logic dynamically
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const pt of this.points) {
          if (pt[0] < minX) minX = pt[0];
          if (pt[1] < minY) minY = pt[1];
          if (pt[0] > maxX) maxX = pt[0];
          if (pt[1] > maxY) maxY = pt[1];
        }
        this.x = minX; this.y = minY;
        this.width = maxX - minX; this.height = maxY - minY;
      }
    }

    class RectElement extends Element {
      constructor() {
        super();
        this.type = 'rect';
        this.cornerRadius = 8;
        this.text = ''; // Flowchart text directly inside
      }
      render(ctx) {
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, this.cornerRadius);
        if (this.fillColor !== 'transparent') {
          ctx.fillStyle = this.fillColor;
          ctx.fill();
        }
        ctx.lineWidth = this.strokeWidth;
        ctx.strokeStyle = this.strokeColor;
        if (this.dashStyle && this.dashStyle.length > 0) ctx.setLineDash(this.dashStyle);
        ctx.stroke();
        ctx.setLineDash([]);
        
        if (this.text) {
          // Render center-aligned text
          ctx.fillStyle = this.strokeColor;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = `${this.strokeWidth * 10}px Inter`;
          ctx.fillText(this.text, this.x + this.width/2, this.y + this.height/2);
        }
      }
    }

    class EllipseElement extends Element {
      constructor() {
        super();
        this.type = 'ellipse';
        this.text = '';
      }
      render(ctx) {
        ctx.beginPath();
        const rx = this.width / 2;
        const ry = this.height / 2;
        ctx.ellipse(this.x + rx, this.y + ry, rx, ry, 0, 0, Math.PI * 2);
        if (this.fillColor !== 'transparent') {
          ctx.fillStyle = this.fillColor;
          ctx.fill();
        }
        ctx.lineWidth = this.strokeWidth;
        ctx.strokeStyle = this.strokeColor;
        if (this.dashStyle && this.dashStyle.length > 0) ctx.setLineDash(this.dashStyle);
        ctx.stroke();
        ctx.setLineDash([]);
        
        if (this.text) {
          ctx.fillStyle = this.strokeColor;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = `${this.strokeWidth * 10}px Inter`;
          ctx.fillText(this.text, this.x + rx, this.y + ry);
        }
      }
    }

    class LineElement extends Element {
      constructor() {
        super();
        this.type = 'line';
        this.x2 = 0;
        this.y2 = 0;
        this.connectedStartId = null; // Smart connectors
        this.connectedEndId = null;
      }
      getBoundingBox() {
        return {
          x: Math.min(this.x, this.x2),
          y: Math.min(this.y, this.y2),
          width: Math.abs(this.x - this.x2) || 1,
          height: Math.abs(this.y - this.y2) || 1
        };
      }
      render(ctx) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x2, this.y2);
        ctx.lineWidth = this.strokeWidth;
        ctx.strokeStyle = this.strokeColor;
        if (this.dashStyle && this.dashStyle.length > 0) ctx.setLineDash(this.dashStyle);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    class ArrowElement extends LineElement {
      constructor() {
        super();
        this.type = 'arrow';
        this.arrowStyle = 'filled';
      }
      render(ctx) {
        super.render(ctx);
        const angle = Math.atan2(this.y2 - this.y, this.x2 - this.x);
        const headlen = 10 + this.strokeWidth * 2;
        
        ctx.save();
        ctx.translate(this.x2, this.y2);
        ctx.rotate(angle);
        
        ctx.beginPath();
        if (this.arrowStyle === 'filled') {
          ctx.moveTo(0, 0);
          ctx.lineTo(-headlen, headlen / 2);
          ctx.lineTo(-headlen, -headlen / 2);
          ctx.closePath();
          ctx.fillStyle = this.strokeColor;
          ctx.fill();
        } else {
          ctx.moveTo(-headlen, headlen / 2);
          ctx.lineTo(0, 0);
          ctx.lineTo(-headlen, -headlen / 2);
          ctx.lineWidth = this.strokeWidth;
          ctx.strokeStyle = this.strokeColor;
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    class TextElement extends Element {
      constructor() {
        super();
        this.type = 'text';
        this.text = '';
        this.fontFamily = 'Inter';
        this.fontSize = 24;
        this.fontWeight = 400;
        this.fontStyle = 'normal';
        this.textAlign = 'left';
        this.lineHeight = 1.5;
      }
      render(ctx) {
        ctx.save();
        ctx.font = `${this.fontStyle} ${this.fontWeight} ${this.fontSize}px ${this.fontFamily}`;
        
        const lines = this.text.split('\n');
        let nativeWidth = 0;
        for (let i = 0; i < lines.length; i++) {
          const w = ctx.measureText(lines[i]).width;
          if (w > nativeWidth) nativeWidth = w;
        }
        let nativeHeight = Math.max(1, lines.length * this.fontSize * this.lineHeight);
        nativeWidth = Math.max(1, nativeWidth);

        // Update dimensions continuously so Selection Tool handles match
        this.width = nativeWidth;
        this.height = nativeHeight;

        ctx.fillStyle = this.strokeColor || '#ffffff';
        ctx.textAlign = this.textAlign || 'left';
        ctx.textBaseline = 'top';
        
        for (let i = 0; i < lines.length; i++) {
            let dx = this.x;
            if (ctx.textAlign === 'center') dx = this.x + nativeWidth / 2;
            else if (ctx.textAlign === 'right') dx = this.x + nativeWidth;
            
            ctx.fillText(lines[i], dx, this.y + (i * this.fontSize * this.lineHeight));
        }
        ctx.restore();
      }
    }

    class StickyElement extends RectElement {
      constructor() {
        super();
        this.type = 'sticky';
        this.noteColor = '#fef3c7'; // pastel default
        this.textElementId = null; // linked text element
      }
      render(ctx) {
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, 4);
        ctx.fillStyle = this.noteColor;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.stroke();
        
        if (this.text) {
          ctx.fillStyle = '#1f2937'; // dark text on sticky
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = `16px Inter`;
          const lines = this.text.split('\n');
          for (let i=0; i<lines.length; i++) {
            ctx.fillText(lines[i], this.x + this.width/2, this.y + this.height/2 + (i - lines.length/2)*20);
          }
        }
      }
    }

    class ImageElement extends Element {
      constructor() {
        super();
        this.type = 'image';
        this.src = null;
        this.img = null;
      }
      loadImage(src) {
        this.src = src;
        this.img = new Image();
        this.img.src = src;
      }
      render(ctx) {
        if (this.img && this.img.complete) {
          ctx.drawImage(this.img, this.x, this.y, this.width, this.height);
        }
      }
    }

    class FrameElement extends Element {
      constructor() {
        super();
        this.type = 'frame';
        this.name = 'Frame';
      }
      render(ctx) {
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#4f46e5';
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        
        ctx.fillStyle = 'rgba(79, 70, 229, 0.1)';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        ctx.font = '12px Inter';
        const tw = ctx.measureText(this.name).width;
        ctx.fillStyle = '#4f46e5';
        ctx.beginPath();
        ctx.roundRect(this.x, this.y - 20, tw + 16, 20, [4, 4, 0, 0]);
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'left';
        ctx.fillText(this.name, this.x + 8, this.y - 10);
      }
    }

    class Layer {
      constructor(name) {
        this.id = crypto.randomUUID();
        this.name = name;
        this.visible = true;
        this.locked = false;
        this.elements = [];
      }
    }

    class Board {
      constructor() {
        this.layers = [new Layer('Layer 1')];
      }
      
      addElement(element, layerId = null) {
        const layer = layerId ? this.layers.find(l => l.id === layerId) : this.layers[0];
        if (layer) {
          element.layerId = layer.id;
          layer.elements.push(element);
        }
      }
      
      removeElement(id) {
        for (const layer of this.layers) {
          const idx = layer.elements.findIndex(e => e.id === id);
          if (idx !== -1) {
            return layer.elements.splice(idx, 1)[0];
          }
        }
        return null;
      }
      
      findElement(id) {
        for (const layer of this.layers) {
          const el = layer.elements.find(e => e.id === id);
          if (el) return el;
        }
        return null;
      }
      
      getAllElements() {
        const result = [];
        for (let i = this.layers.length - 1; i >= 0; i--) {
          const layer = this.layers[i];
          if (layer.visible && !layer.locked) {
            result.push(...layer.elements);
          }
        }
        return result; // render order (bottom to top based on array order?) 
        // Wait, array order: 0 is bottom. So let's iterate 0 to length
      }

      toJSON() {
        return { layers: this.layers.map(l => ({...l, elements: l.elements.map(e => e.toJSON())})) };
      }
      
      fromJSON(data) {
        if (data && data.layers) {
          this.layers = data.layers;
        }
      }
    }

    // Fix getAllElements render order
    Board.prototype.getAllElements = function() {
      const result = [];
      for (const layer of this.layers) {
        if (layer.visible) {
          // even locked ones render, they are just untouchable for tool interactions... wait, requirements say: "getAllElements() returning elements from all visible unlocked layers in render order"
          // I'll stick to requirement: visible unlocked
          if (!layer.locked) {
            result.push(...layer.elements.filter(e => e.visible));
          }
        }
      }
      return result;
    };

    class GridRenderer {
      constructor(engine) {
        this.engine = engine;
        this.mode = 'none'; // none, dots, squares, isometric
        this.size = 20;
      }
      render(ctx) {
        if (this.mode === 'none') return;
        
        const zoom = this.engine.viewport.zoom;
        const width = this.engine.canvas.width / this.engine.dpr;
        const height = this.engine.canvas.height / this.engine.dpr;
        
        // Bounds in world space
        const left = -this.engine.viewport.x / zoom;
        const right = (width - this.engine.viewport.x) / zoom;
        const top = -this.engine.viewport.y / zoom;
        const bottom = (height - this.engine.viewport.y) / zoom;
        
        const startX = Math.floor(left / this.size) * this.size;
        const endX = Math.ceil(right / this.size) * this.size;
        const startY = Math.floor(top / this.size) * this.size;
        const endY = Math.ceil(bottom / this.size) * this.size;

        ctx.save();
        if (this.mode === 'dots') {
          const opacity = Math.min(1, zoom) * 0.15;
          ctx.fillStyle = `rgba(255,255,255,${opacity})`;
          if (zoom > 0.3 && zoom < 8) {
             for (let x = startX; x <= endX; x += this.size) {
               for (let y = startY; y <= endY; y += this.size) {
                 ctx.fillRect(x - 0.75/zoom, y - 0.75/zoom, 1.5/zoom, 1.5/zoom);
               }
             }
          }
        } else if (this.mode === 'squares') {
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.lineWidth = 1/zoom;
          ctx.beginPath();
          for (let x = startX; x <= endX; x += this.size) { ctx.moveTo(x, top); ctx.lineTo(x, bottom); }
          for (let y = startY; y <= endY; y += this.size) { ctx.moveTo(left, y); ctx.lineTo(right, y); }
          ctx.stroke();
        } else if (this.mode === 'isometric') {
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.lineWidth = 1/zoom;
          ctx.beginPath();
          const tan30 = Math.tan(Math.PI / 6);
          // Simplified isometric lines
          for (let x = startX - height; x <= endX + height; x += this.size) {
             ctx.moveTo(x, startY);
             ctx.lineTo(x + height * tan30, bottom);
             ctx.moveTo(x, startY);
             ctx.lineTo(x - height * tan30, bottom);
          }
          for (let y = startY; y <= endY; y += this.size) { ctx.moveTo(left, y); ctx.lineTo(right, y); }
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    class Command {
      execute() {}
      undo() {}
    }

    class AddElementCommand extends Command {
      constructor(board, element, layerId = null) {
        super();
        this.board = board;
        this.element = element;
        this.layerId = layerId;
      }
      execute() { this.board.addElement(this.element, this.layerId); }
      undo() { this.board.removeElement(this.element.id); }
    }

    class RemoveElementsCommand extends Command {
      constructor(board, elements) {
        super();
        this.board = board;
        this.elements = elements;
        this.removedData = [];
      }
      execute() {
        this.removedData = [];
        for (const el of this.elements) {
          const removed = this.board.removeElement(el.id);
          if (removed) {
            this.removedData.push({ element: removed, layerId: removed.layerId });
          }
        }
      }
      undo() {
        for (const data of this.removedData) {
          this.board.addElement(data.element, data.layerId);
        }
      }
    }

    class MoveElementsCommand extends Command {
      constructor(elements, dx, dy) {
        super();
        this.elements = elements;
        this.dx = dx;
        this.dy = dy;
      }
      execute() {
        for (const el of this.elements) {
          el.x += this.dx;
          el.y += this.dy;
          if (el.x2 !== undefined) { el.x2 += this.dx; el.y2 += this.dy; }
        }
      }
      undo() {
        for (const el of this.elements) {
          el.x -= this.dx;
          el.y -= this.dy;
          if (el.x2 !== undefined) { el.x2 -= this.dx; el.y2 -= this.dy; }
        }
      }
    }

    class ModifyElementCommand extends Command {
      constructor(element, property, before, after) {
        super();
        this.element = element;
        this.property = property;
        this.before = before;
        this.after = after;
      }
      execute() { this.element[this.property] = this.after; }
      undo() { this.element[this.property] = this.before; }
    }

    class History {
      constructor() {
        this.commands = [];
        this.cursor = 0;
      }
      
      execute(command) {
        command.execute();
        this.commands.length = this.cursor; // trim future
        this.commands.push(command);
        if (this.commands.length > 100) {
          this.commands.shift();
        } else {
          this.cursor++;
        }
        if (window.whiteboardEngine) window.whiteboardEngine.markDirty();
      }
      
      undo() {
        if (this.cursor > 0) {
          this.cursor--;
          this.commands[this.cursor].undo();
          if (window.whiteboardEngine) window.whiteboardEngine.markDirty();
        }
      }
      
      redo() {
        if (this.cursor < this.commands.length) {
          this.commands[this.cursor].execute();
          this.cursor++;
          if (window.whiteboardEngine) window.whiteboardEngine.markDirty();
        }
      }
    }

    class BaseTool {
      constructor(engine) { this.engine = engine; }
      activate() {}
      deactivate() {}
      onPointerDown(e, pt) {}
      onPointerMove(e, pt) {}
      onPointerUp(e, pt) {}
      onRender(ctx) {}
    }

    class HandTool extends BaseTool {
      // Logic handled globally in CanvasEngine pan section
    }

    class BaseShapeTool extends BaseTool {
      constructor(engine, ElementClass) {
        super(engine);
        this.ElementClass = ElementClass;
        this.isDrawing = false;
        this.startPt = null;
        this.previewElement = null;
      }
      onPointerDown(e, pt) {
        if (e.button !== 0) return;
        this.isDrawing = true;
        this.startPt = pt;
        this.previewElement = new this.ElementClass();
        this.previewElement.x = pt.x;
        this.previewElement.y = pt.y;
        this.previewElement.width = 0;
        this.previewElement.height = 0;
        if (this.previewElement.x2 !== undefined) {
          this.previewElement.x2 = pt.x;
          this.previewElement.y2 = pt.y;
        }
        if (this.engine.globalStyle) {
           Object.assign(this.previewElement, this.engine.globalStyle);
        }
        this.engine.markDirty();
      }
      onPointerMove(e, pt) {
        if (!this.isDrawing || !this.previewElement) return;
        if (e.shiftKey) {
          const dx = pt.x - this.startPt.x;
          const dy = pt.y - this.startPt.y;
          const size = Math.max(Math.abs(dx), Math.abs(dy));
          this.previewElement.width = size * Math.sign(dx);
          this.previewElement.height = size * Math.sign(dy);
          // For lines
          if (this.previewElement.x2 !== undefined) {
            // Constrain to 45 deg
            if (Math.abs(dx) > Math.abs(dy) * 2) {
              this.previewElement.x2 = pt.x; this.previewElement.y2 = this.startPt.y;
            } else if (Math.abs(dy) > Math.abs(dx) * 2) {
              this.previewElement.x2 = this.startPt.x; this.previewElement.y2 = pt.y;
            } else {
              this.previewElement.x2 = this.startPt.x + size * Math.sign(dx);
              this.previewElement.y2 = this.startPt.y + size * Math.sign(dy);
            }
          }
        } else {
          this.previewElement.width = pt.x - this.startPt.x;
          this.previewElement.height = pt.y - this.startPt.y;
          if (this.previewElement.x2 !== undefined) {
            this.previewElement.x2 = pt.x;
            this.previewElement.y2 = pt.y;
          }
        }
        
        // Normalize rect/ellipse width/height
        if (this.previewElement.width < 0 && this.previewElement.x2 === undefined) {
          this.previewElement.x = this.startPt.x + this.previewElement.width;
          this.previewElement.width = Math.abs(this.previewElement.width);
        }
        if (this.previewElement.height < 0 && this.previewElement.x2 === undefined) {
          this.previewElement.y = this.startPt.y + this.previewElement.height;
          this.previewElement.height = Math.abs(this.previewElement.height);
        }
        
        this.engine.markDirty();
      }
      onPointerUp(e, pt) {
        if (!this.isDrawing || !this.previewElement) return;
        this.isDrawing = false;
        if (this.previewElement.width !== 0 || this.previewElement.height !== 0 || (this.previewElement.x2 !== undefined && (this.previewElement.x !== this.previewElement.x2 || this.previewElement.y !== this.previewElement.y2))) {
          this.engine.history.execute(new AddElementCommand(this.engine.board, this.previewElement));
        }
        this.previewElement = null;
        this.engine.markDirty();
      }
      onRender(ctx) {
        if (this.isDrawing && this.previewElement) {
          ctx.save();
          ctx.globalAlpha = 0.5;
          this.previewElement.render(ctx);
          ctx.restore();
        }
      }
    }

    class PenTool extends BaseTool {
      constructor(engine) {
        super(engine);
        this.isDrawing = false;
        this.previewElement = null;
        this.isHighlighter = false;
      }
      onPointerDown(e, pt) {
        if (e.button !== 0) return;
        this.isDrawing = true;
        this.previewElement = new StrokeElement();
        if (this.engine.globalStyle) {
           Object.assign(this.previewElement, this.engine.globalStyle);
        }
        if (this.isHighlighter) {
          this.previewElement.opacity = 0.3;
          this.previewElement.dashStyle = ['highlighter'];
        }
        this.previewElement.points.push([pt.x, pt.y, e.pressure || 0.5]);
        this.engine.markDirty();
      }
      onPointerMove(e, pt) {
        if (!this.isDrawing || !this.previewElement) return;
        // only push if distance from last point is > 1
        const last = this.previewElement.points[this.previewElement.points.length - 1];
        if (Math.hypot(last[0] - pt.x, last[1] - pt.y) > 1) {
          this.previewElement.points.push([pt.x, pt.y, e.pressure || 0.5]);
          this.engine.markDirty();
        }
      }
      onPointerUp(e, pt) {
        if (!this.isDrawing || !this.previewElement) return;
        this.isDrawing = false;
        if (this.previewElement.points.length > 1) {
          // Shape recognition logic could drop in here
          this.engine.history.execute(new AddElementCommand(this.engine.board, this.previewElement));
        }
        this.previewElement = null;
        this.engine.markDirty();
      }
      onRender(ctx) {
        if (this.isDrawing && this.previewElement) {
          ctx.save();
          if (this.isHighlighter) ctx.globalCompositeOperation = 'multiply';
          this.previewElement.render(ctx);
          ctx.restore();
        }
      }
    }

    class EraserTool extends BaseTool {
      constructor(engine) {
        super(engine);
        this.isErasing = false;
        this.erasedInStroke = new Set();
      }
      onPointerDown(e, pt) {
        if (e.button !== 0) return;
        this.isErasing = true;
        this.erasedInStroke.clear();
        this.eraseAtPoint(pt);
      }
      onPointerMove(e, pt) {
        if (!this.isErasing) return;
        this.eraseAtPoint(pt);
      }
      onPointerUp(e, pt) {
        this.isErasing = false;
        this.erasedInStroke.clear();
      }
      eraseAtPoint(pt) {
        const elements = this.engine.board.getAllElements();
        const hitRadius = 10 / this.engine.viewport.zoom;
        let removed = [];
        for (const el of elements) {
          if (this.erasedInStroke.has(el.id)) continue;
          const bb = el.getBoundingBox();
          if (pt.x >= bb.x - hitRadius && pt.x <= bb.x + bb.width + hitRadius &&
              pt.y >= bb.y - hitRadius && pt.y <= bb.y + bb.height + hitRadius) {
            removed.push(el);
            this.erasedInStroke.add(el.id);
          }
        }
        if (removed.length > 0) {
          this.engine.history.execute(new RemoveElementsCommand(this.engine.board, removed));
          this.engine.markDirty();
        }
      }
      onRender(ctx) {}
    }

    class RectTool extends BaseShapeTool { constructor(e) { super(e, RectElement); } }
    class EllipseTool extends BaseShapeTool { constructor(e) { super(e, EllipseElement); } }
    class LineTool extends BaseShapeTool { constructor(e) { super(e, LineElement); } }
    class ArrowTool extends BaseShapeTool { constructor(e) { super(e, ArrowElement); } }
    class FrameTool extends BaseShapeTool { constructor(e) { super(e, FrameElement); } }

    class TextTool extends BaseTool {
      onPointerDown(e, pt) {
        if (e.button !== 0) return;
        const txt = new TextElement();
        if (this.engine.globalStyle) Object.assign(txt, this.engine.globalStyle);
        this.engine.spawnTextEditor(e.clientX, e.clientY, pt, txt, false, true);
      }
    }
    class StickyTool extends BaseTool {
      onPointerDown(e, pt) {
        if (e.button !== 0) return;
        const sticky = new StickyElement();
        sticky.x = pt.x; sticky.y = pt.y;
        sticky.width = 200; sticky.height = 200;
        const colors = ['#fef3c7', '#dcfce7', '#e0e7ff', '#fce7f3', '#fee2e2', '#f3f4f6'];
        sticky.noteColor = colors[Math.floor(Math.random() * colors.length)];
        this.engine.history.execute(new AddElementCommand(this.engine.board, sticky));
        
        // Spawn text editor centered
        const centerScreen = this.engine.worldToScreen(pt.x + 100, pt.y + 100);
        this.engine.spawnTextEditor(centerScreen.x, centerScreen.y, pt, sticky, true, false);
        this.engine.toolManager.setTool('select');
      }
    }
    class ImageTool extends BaseTool {
      activate() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
          if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const imgEl = new ImageElement();
              imgEl.loadImage(ev.target.result);
              imgEl.img.onload = () => {
                imgEl.width = imgEl.img.width;
                imgEl.height = imgEl.img.height;
                // Place at viewport center
                const cx = (window.innerWidth / 2) / this.engine.dpr;
                const cy = (window.innerHeight / 2) / this.engine.dpr;
                const pt = this.engine.screenToWorld(cx, cy);
                imgEl.x = pt.x - imgEl.width / 2;
                imgEl.y = pt.y - imgEl.height / 2;
                this.engine.history.execute(new AddElementCommand(this.engine.board, imgEl));
              };
            };
            reader.readAsDataURL(e.target.files[0]);
          }
          this.engine.toolManager.setTool('select');
        };
        input.click();
      }
    }

    class ToolManager {
      constructor() {
        this.currentTool = 'hand';
        this.tools = {};
      }
      registerTool(name, toolObject) {
        this.tools[name] = toolObject;
      }
      setTool(name) {
        if (this.tools[this.currentTool] && this.tools[this.currentTool].deactivate) {
          this.tools[this.currentTool].deactivate();
        }
        this.currentTool = name;
        if (this.tools[this.currentTool] && this.tools[this.currentTool].activate) {
          this.tools[this.currentTool].activate();
        }
      }
      getActiveTool() {
        return this.tools[this.currentTool];
      }
    }

    class CanvasEngine {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;
        this.viewport = { x: 0, y: 0, zoom: 1 };
        
        this.board = new Board();
        this.history = new History();
        this.toolManager = new ToolManager();
        this.gridRenderer = new GridRenderer(this);
        
        // Settings
        this.settings = { snapToGrid: false, snapToObjects: false };
        this.snapLines = []; // visual representation of snaps
        
        this.globalStyle = {
           strokeColor: '#6366f1',
           fillColor: 'transparent',
           strokeWidth: 2,
           dashStyle: [],
           opacity: 1,
           fontFamily: 'Inter',
           fontSize: 24,
           fontWeight: 400,
           fontStyle: 'normal'
        };

        this.isSpaceHeld = false;
        
        this.isPanDragging = false;
        this.lastPanPoint = null;
        
        this.toolManager.registerTool('hand', new HandTool(this));
        
        class SelectTool extends BaseTool {
          constructor(engine) {
            super(engine);
            this.selection = [];
            this.mode = 'idle'; // idle, move, resize, rotate, lasso
            this.startPt = null;
            this.activeHandle = null;
            this.lassoRect = null;
            this.initialPos = new Map();
          }
          onPointerDown(e, pt) {
            if (e.button !== 0) return;
            this.startPt = pt;
            
            // 1. Check handles (resize/rotate) if selection exists
            if (this.selection.length === 1) {
              const el = this.selection[0];
              const bb = el.getBoundingBox();
              const handles = this.getHandles(bb);
              
              let hitPt = pt;
              if (el.rotation) {
                const cx = bb.x + bb.width/2;
                const cy = bb.y + bb.height/2;
                const dx = pt.x - cx;
                const dy = pt.y - cy;
                hitPt = {
                  x: cx + dx * Math.cos(-el.rotation) - dy * Math.sin(-el.rotation),
                  y: cy + dx * Math.sin(-el.rotation) + dy * Math.cos(-el.rotation)
                };
              }

              for (const [key, h] of Object.entries(handles)) {
                if (Math.hypot(h.x - hitPt.x, h.y - hitPt.y) < 10 / this.engine.viewport.zoom) {
                  this.mode = key === 'rotate' ? 'rotate' : 'resize';
                  this.activeHandle = key;
                  this.initialPos.set(el, { ...el });
                  return;
                }
              }
            }

            // 2. Check hit test on elements
            const elements = this.engine.board.getAllElements();
            let hit = null;
            // Iterate backwards for z-index
            for (let i = elements.length - 1; i >= 0; i--) {
              if (elements[i].containsPoint(pt.x, pt.y)) {
                hit = elements[i];
                break;
              }
            }
            
            if (hit) {
              if (hit.type === 'rect' || hit.type === 'ellipse' || hit.type === 'sticky' || hit.type === 'text') {
                if (e.detail === 2) {
                  // Double click text editing
                  const bb = hit.getBoundingBox();
                  const centerScreen = this.engine.worldToScreen(bb.x + bb.width/2, bb.y + bb.height/2);
                  const tlScreen = this.engine.worldToScreen(bb.x, bb.y);
                  
                  // Text elements align differently based on text align 
                  let sx = tlScreen.x;
                  if (hit.type === 'text') {
                    if (hit.textAlign === 'center') sx = centerScreen.x;
                    else if (hit.textAlign === 'right') sx = this.engine.worldToScreen(bb.x + bb.width, bb.y).x;
                  } else {
                    sx = centerScreen.x;
                  }
                  
                  const sy = hit.type === 'text' ? tlScreen.y : centerScreen.y;
                  this.engine.spawnTextEditor(sx, sy, pt, hit, hit.type === 'sticky', false);
                  return;
                }
              }
            
              if (e.shiftKey) {
                const idx = this.selection.indexOf(hit);
                if (idx > -1) this.selection.splice(idx, 1);
                else this.selection.push(hit);
              } else {
                if (!this.selection.includes(hit)) {
                  this.selection = [hit];
                }
              }
              this.mode = 'move';
              this.initialPos.clear();
              for (const el of this.selection) {
                this.initialPos.set(el, { x: el.x, y: el.y, x2: el.x2, y2: el.y2, width: el.width, height: el.height });
              }
            } else {
              if (!e.shiftKey) this.selection = [];
              this.mode = 'lasso';
              this.lassoRect = { x: pt.x, y: pt.y, width: 0, height: 0 };
            }
            this.engine.markDirty();
          }
          onPointerMove(e, pt) {
            if (this.mode === 'idle') {
              let cursor = '';
              if (this.selection.length === 1) {
                const el = this.selection[0];
                const bb = el.getBoundingBox();
                const handles = this.getHandles(bb);
                
                let hitPt = pt;
                if (el.rotation) {
                  const cx = bb.x + bb.width/2;
                  const cy = bb.y + bb.height/2;
                  const dx = pt.x - cx;
                  const dy = pt.y - cy;
                  hitPt = {
                    x: cx + dx * Math.cos(-el.rotation) - dy * Math.sin(-el.rotation),
                    y: cy + dx * Math.sin(-el.rotation) + dy * Math.cos(-el.rotation)
                  };
                }

                for (const [key, h] of Object.entries(handles)) {
                  if (Math.hypot(h.x - hitPt.x, h.y - hitPt.y) < 10 / this.engine.viewport.zoom) {
                    if (key === 'rotate') cursor = 'alias';
                    else if (key === 'nw' || key === 'se') cursor = 'nwse-resize';
                    else if (key === 'ne' || key === 'sw') cursor = 'nesw-resize';
                    else if (key === 'n' || key === 's') cursor = 'ns-resize';
                    else if (key === 'e' || key === 'w') cursor = 'ew-resize';
                    break;
                  }
                }
              }
              
              if (!cursor) {
                const elements = this.engine.board.getAllElements();
                for (let i = elements.length - 1; i >= 0; i--) {
                  if (elements[i].containsPoint(pt.x, pt.y)) {
                    cursor = 'move';
                    if (elements[i].type === 'text' || elements[i].type === 'sticky') {
                      cursor = 'text';
                    }
                    break;
                  }
                }
              }
              this.engine.canvas.style.cursor = cursor || 'default';
            } else if (this.mode === 'move') {
              const dx = pt.x - this.startPt.x;
              const dy = pt.y - this.startPt.y;
              for (const el of this.selection) {
                const init = this.initialPos.get(el);
                if (init) {
                  el.x = init.x + dx;
                  el.y = init.y + dy;
                  if (el.x2 !== undefined) { el.x2 = init.x2 + dx; el.y2 = init.y2 + dy; }
                }
              }
              this.engine.markDirty();
            } else if (this.mode === 'lasso') {
              this.lassoRect.width = pt.x - this.startPt.x;
              this.lassoRect.height = pt.y - this.startPt.y;
              this.engine.markDirty();
            } else if (this.mode === 'resize') {
              // Simplified resize logic for single selection
              const el = this.selection[0];
              const init = this.initialPos.get(el);
              
              const cx = init.x + init.width/2;
              const cy = init.y + init.height/2;
              
              const unrotate = (p) => {
                if (!init.rotation) return p;
                const dx = p.x - cx;
                const dy = p.y - cy;
                return {
                  x: cx + dx * Math.cos(-init.rotation) - dy * Math.sin(-init.rotation),
                  y: cy + dx * Math.sin(-init.rotation) + dy * Math.cos(-init.rotation)
                };
              };
              
              const localPt = unrotate(pt);
              const localStart = unrotate(this.startPt);
              
              const dx = localPt.x - localStart.x;
              const dy = localPt.y - localStart.y;
              
              let newW = init.width;
              let newH = init.height;
              let localDx = 0;
              let localDy = 0;
              
              if (this.activeHandle.includes('e')) newW = Math.max(1, init.width + dx);
              if (this.activeHandle.includes('w')) { newW = Math.max(1, init.width - dx); localDx = init.width - newW; }
              if (this.activeHandle.includes('s')) newH = Math.max(1, init.height + dy);
              if (this.activeHandle.includes('n')) { newH = Math.max(1, init.height - dy); localDy = init.height - newH; }

              if (el.type === 'text') {
                 let scale = 1;
                 if (this.activeHandle.length === 2) {
                    scale = Math.max(newW / init.width, newH / init.height);
                 } else if (this.activeHandle === 'e' || this.activeHandle === 'w') {
                    scale = newW / init.width;
                 } else {
                    scale = newH / init.height;
                 }
                 el.fontSize = Math.max(4, Math.round(init.fontSize * scale));
                 newW = init.width * (el.fontSize / init.fontSize);
                 newH = init.height * (el.fontSize / init.fontSize);
                 localDx = 0; localDy = 0;
                 if (this.activeHandle.includes('w')) localDx = init.width - newW;
                 if (this.activeHandle.includes('n')) localDy = init.height - newH;
              }

              el.width = newW;
              el.height = newH;
              
              const newLocalCx = init.x + localDx + newW/2;
              const newLocalCy = init.y + localDy + newH/2;
              const oldLocalCx = init.x + init.width/2;
              const oldLocalCy = init.y + init.height/2;

              const dcx = newLocalCx - oldLocalCx;
              const dcy = newLocalCy - oldLocalCy;

              const globalDcx = dcx * Math.cos(init.rotation || 0) - dcy * Math.sin(init.rotation || 0);
              const globalDcy = dcx * Math.sin(init.rotation || 0) + dcy * Math.cos(init.rotation || 0);

              el.x = (oldLocalCx + globalDcx) - newW/2;
              el.y = (oldLocalCy + globalDcy) - newH/2;
              this.engine.markDirty();
            } else if (this.mode === 'rotate') {
              const el = this.selection[0];
              const init = this.initialPos.get(el);
              const cx = init.x + init.width / 2;
              const cy = init.y + init.height / 2;
              el.rotation = Math.atan2(pt.y - cy, pt.x - cx) + Math.PI / 2;
              if (e.shiftKey) el.rotation = Math.round(el.rotation / (Math.PI / 12)) * (Math.PI / 12);
              this.engine.markDirty();
            }
          }
          onPointerUp(e, pt) {
            if (this.mode === 'move') {
              const dx = pt.x - this.startPt.x;
              const dy = pt.y - this.startPt.y;
              if (dx !== 0 || dy !== 0) {
                // To support undo properly, we should revert, then apply Command.
                for (const el of this.selection) {
                  const init = this.initialPos.get(el);
                  if (init) {
                    el.x = init.x; el.y = init.y;
                    if (el.x2 !== undefined) { el.x2 = init.x2; el.y2 = init.y2; }
                  }
                }
                this.engine.history.execute(new MoveElementsCommand(this.selection, dx, dy));
              }
            } else if (this.mode === 'lasso') {
              // Collect all intersecting elements
              const elements = this.engine.board.getAllElements();
              const rx = Math.min(this.lassoRect.x, this.lassoRect.x + this.lassoRect.width);
              const ry = Math.min(this.lassoRect.y, this.lassoRect.y + this.lassoRect.height);
              const rw = Math.abs(this.lassoRect.width);
              const rh = Math.abs(this.lassoRect.height);
              
              for (const el of elements) {
                const bb = el.getBoundingBox();
                if (bb.x < rx + rw && bb.x + bb.width > rx && bb.y < ry + rh && bb.y + bb.height > ry) {
                  if (!this.selection.includes(el)) this.selection.push(el);
                }
              }
            } else if (this.mode === 'resize' || this.mode === 'rotate') {
              const el = this.selection[0];
              const init = this.initialPos.get(el);
               if (el && init) {
                 const endState = { x: el.x, y: el.y, width: el.width, height: el.height, rotation: el.rotation, fontSize: el.fontSize };
                 el.x = init.x; el.y = init.y; el.width = init.width; el.height = init.height; el.rotation = init.rotation;
                 if (el.type === 'text') el.fontSize = init.fontSize;
                 this.engine.history.execute({
                    execute: () => { el.x = endState.x; el.y = endState.y; el.width = endState.width; el.height = endState.height; el.rotation = endState.rotation; if (el.type === 'text') el.fontSize = endState.fontSize; },
                    undo: () => { el.x = init.x; el.y = init.y; el.width = init.width; el.height = init.height; el.rotation = init.rotation; if (el.type === 'text') el.fontSize = init.fontSize; }
                 });
                 this.engine.markDirty();
              }
            }
            this.mode = 'idle';
            this.engine.canvas.style.cursor = 'default';
            this.lassoRect = null;
            this.engine.markDirty();
          }
          getHandles(bb) {
            return {
              nw: { x: bb.x, y: bb.y },
              n: { x: bb.x + bb.width/2, y: bb.y },
              ne: { x: bb.x + bb.width, y: bb.y },
              e: { x: bb.x + bb.width, y: bb.y + bb.height/2 },
              se: { x: bb.x + bb.width, y: bb.y + bb.height },
              s: { x: bb.x + bb.width/2, y: bb.y + bb.height },
              sw: { x: bb.x, y: bb.y + bb.height },
              w: { x: bb.x, y: bb.y + bb.height/2 },
              rotate: { x: bb.x + bb.width/2, y: bb.y - 28/this.engine.viewport.zoom }
            };
          }
          onRender(ctx) {
            const zoom = this.engine.viewport.zoom;
            
            // Draw Lasso
            if (this.mode === 'lasso' && this.lassoRect) {
              ctx.save();
              ctx.setTransform(zoom * this.engine.dpr, 0, 0, zoom * this.engine.dpr, this.engine.viewport.x * this.engine.dpr, this.engine.viewport.y * this.engine.dpr);
              ctx.lineWidth = 1 / zoom;
              ctx.strokeStyle = '#6366f1';
              ctx.fillStyle = 'rgba(99, 102, 241, 0.1)';
              ctx.setLineDash([5 / zoom, 5 / zoom]);
              ctx.fillRect(this.lassoRect.x, this.lassoRect.y, this.lassoRect.width, this.lassoRect.height);
              ctx.strokeRect(this.lassoRect.x, this.lassoRect.y, this.lassoRect.width, this.lassoRect.height);
              ctx.restore();
            }
            
            // Draw Selection Boxes
            if (this.selection.length > 0) {
              ctx.save();
              ctx.setTransform(zoom * this.engine.dpr, 0, 0, zoom * this.engine.dpr, this.engine.viewport.x * this.engine.dpr, this.engine.viewport.y * this.engine.dpr);
              ctx.lineWidth = 1.5 / zoom;
              ctx.strokeStyle = '#6366f1';
              
              if (this.selection.length === 1) {
                const el = this.selection[0];
                const bb = el.getBoundingBox();
                
                // Rotated drawing requires saving context per element rotation
                ctx.save();
                ctx.translate(bb.x + bb.width/2, bb.y + bb.height/2);
                ctx.rotate(el.rotation);
                ctx.translate(-(bb.x + bb.width/2), -(bb.y + bb.height/2));
                
                ctx.strokeRect(bb.x - 2/zoom, bb.y - 2/zoom, bb.width + 4/zoom, bb.height + 4/zoom);
                
                // Draw Handles
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                const handles = this.getHandles(bb);
                const hs = 8 / zoom;
                for (const [key, h] of Object.entries(handles)) {
                  if (key === 'rotate') {
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, hs, 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(h.x, bb.y);
                    ctx.lineTo(h.x, h.y + hs);
                    ctx.stroke();
                  } else {
                    ctx.fillRect(h.x - hs/2, h.y - hs/2, hs, hs);
                    ctx.strokeRect(h.x - hs/2, h.y - hs/2, hs, hs);
                  }
                }
                ctx.restore();
              } else {
                // Multi-select bounding box
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                for (const el of this.selection) {
                  const bb = el.getBoundingBox();
                  if (bb.x < minX) minX = bb.x;
                  if (bb.y < minY) minY = bb.y;
                  if (bb.x + bb.width > maxX) maxX = bb.x + bb.width;
                  if (bb.y + bb.height > maxY) maxY = bb.y + bb.height;
                }
                ctx.strokeRect(minX - 4/zoom, minY - 4/zoom, maxX - minX + 8/zoom, maxY - minY + 8/zoom);
              }
              ctx.restore();
            }
          }
        }
        
        this.toolManager.registerTool('select', new SelectTool(this));
        this.toolManager.registerTool('pen', new PenTool(this));
        
        const highlighter = new PenTool(this);
        highlighter.isHighlighter = true;
        this.toolManager.registerTool('highlighter', highlighter);
        
        this.toolManager.registerTool('eraser', new EraserTool(this));
        this.toolManager.registerTool('rect', new RectTool(this));
        this.toolManager.registerTool('ellipse', new EllipseTool(this));
        this.toolManager.registerTool('line', new LineTool(this));
        this.toolManager.registerTool('arrow', new ArrowTool(this));
        this.toolManager.registerTool('text', new TextTool(this));
        this.toolManager.registerTool('sticky', new StickyTool(this));
        this.toolManager.registerTool('image', new ImageTool(this));
        this.toolManager.registerTool('frame', new FrameTool(this));
        
        this.toolManager.setTool('select');
        
        this.isDirty = true;
        
        this.setupEvents();
        this.initUI();
        window.addEventListener('resize', () => this.resize());
        this.resize();
        
        this.render = this.render.bind(this);
        requestAnimationFrame(this.render);
      }
      
      setupEvents() {
        window.addEventListener('keydown', e => {
          if (e.code === 'Space') this.isSpaceHeld = true;
        });
        window.addEventListener('keyup', e => {
          if (e.code === 'Space') {
            this.isSpaceHeld = false;
            this.isPanDragging = false;
            this.lastPanPoint = null;
          }
        });

        this.canvas.addEventListener('wheel', e => {
          e.preventDefault();
          if (e.ctrlKey || e.metaKey || true) { // Always zoom on scroll for infinite canvas, though usually without ctrl it pans. Let's make it zoom always as per requirements
            const scaleAmount = Math.exp(-e.deltaY * 0.001);
            const newZoom = clamp(this.viewport.zoom * scaleAmount, 0.02, 40);
            const factor = newZoom / this.viewport.zoom;
            
            // Anchor to cursor
            const pt = this.screenToWorld(e.clientX, e.clientY);
            this.viewport.zoom = newZoom;
            this.viewport.x = (e.clientX / this.dpr) - pt.x * this.viewport.zoom;
            this.viewport.y = (e.clientY / this.dpr) - pt.y * this.viewport.zoom;
            
            this.markDirty();
          }
        }, { passive: false });

        this.canvas.addEventListener('pointerdown', e => {
          this.canvas.setPointerCapture(e.pointerId);
          if (e.button === 1 || this.isSpaceHeld || this.toolManager.currentTool === 'hand') {
            this.isPanDragging = true;
            this.lastPanPoint = { x: e.clientX, y: e.clientY };
            return;
          }
          const pt = this.screenToWorld(e.clientX, e.clientY);
          const tool = this.toolManager.getActiveTool();
          if (tool && tool.onPointerDown) {
            tool.onPointerDown(e, pt);
          }
        });

        this.canvas.addEventListener('pointermove', e => {
          if (this.isPanDragging) {
            const dx = e.clientX - this.lastPanPoint.x;
            const dy = e.clientY - this.lastPanPoint.y;
            this.viewport.x += dx / this.dpr;
            this.viewport.y += dy / this.dpr;
            this.lastPanPoint = { x: e.clientX, y: e.clientY };
            this.markDirty();
            return;
          }
          
          let pt = this.screenToWorld(e.clientX, e.clientY);
          
          // Snap logic before passing to tools
          this.snapLines = [];
          if (this.settings.snapToGrid && this.gridRenderer.mode !== 'none') {
             pt.x = Math.round(pt.x / this.gridRenderer.size) * this.gridRenderer.size;
             pt.y = Math.round(pt.y / this.gridRenderer.size) * this.gridRenderer.size;
          }
          if (this.settings.snapToObjects && !this.isPanDragging) {
             const threshold = 8 / this.viewport.zoom;
             let snappedX = false;
             let snappedY = false;
             
             // Very basic snap detection against all element centers and edges
             const elements = this.board.getAllElements();
             // Optimization: skip currently moving element in SelectTool - but we don't have direct access here easily. 
             // We'll just snap to everything.
             for (const el of elements) {
               const bb = el.getBoundingBox();
               const pts = [bb.x, bb.x + bb.width/2, bb.x + bb.width];
               for (const x of pts) {
                 if (!snappedX && Math.abs(pt.x - x) < threshold) {
                   pt.x = x; snappedX = true;
                   this.snapLines.push({x1:x, y1:-10000, x2:x, y2:10000}); // vertical guide
                 }
               }
               const yts = [bb.y, bb.y + bb.height/2, bb.y + bb.height];
               for (const y of yts) {
                 if (!snappedY && Math.abs(pt.y - y) < threshold) {
                   pt.y = y; snappedY = true;
                   this.snapLines.push({x1:-10000, y1:y, x2:10000, y2:y}); // horizontal guide
                 }
               }
             }
          }

          const tool = this.toolManager.getActiveTool();
          if (tool && tool.onPointerMove) {
            tool.onPointerMove(e, pt);
          }
        });
        
        // Context Menu
        this.canvas.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const menu = document.getElementById('context-menu');
          menu.style.display = 'block';
          menu.style.left = `${e.clientX}px`;
          menu.style.top = `${e.clientY}px`;
          
          const closeMenu = () => {
             menu.style.display = 'none';
             document.removeEventListener('pointerdown', closeMenu);
          };
          // small timeout to avoid immediate close
          setTimeout(() => document.addEventListener('pointerdown', closeMenu), 10);
        });
        
        // Shortcut keys
        this.clipboard = [];
        window.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          
          if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            if (e.shiftKey) this.history.redo();
            else this.history.undo();
            this.markDirty();
            e.preventDefault();
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
            const sel = this.toolManager.getActiveTool()?.selection;
            if (sel?.length > 0) {
              this.clipboard = sel.map(el => JSON.parse(JSON.stringify(el.toJSON())));
            }
          }
          if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'd')) {
            let src = e.key === 'd' ? this.toolManager.getActiveTool()?.selection?.map(el => JSON.parse(JSON.stringify(el.toJSON()))) : this.clipboard;
            if (src && src.length > 0) {
              const newEls = src.map(data => {
                const copy = Element.fromJSON(data);
                copy.id = crypto.randomUUID();
                copy.x += 20; copy.y += 20;
                if (copy.x2 !== undefined) { copy.x2 += 20; copy.y2 += 20; }
                return copy;
              });
              // Group command logic (simple loop for now)
              for (const el of newEls) this.history.execute(new AddElementCommand(this.board, el));
              
              // Select the newly pasted elements
              const selTool = this.toolManager.tools['select'];
              if (selTool) {
                this.toolManager.setTool('select');
                selTool.selection = newEls;
                selTool.initialPos.clear();
              }
              this.markDirty();
            }
            e.preventDefault();
          }
          if ((e.ctrlKey || e.metaKey) && (e.key === '[' || e.key === ']')) {
            const sel = this.toolManager.getActiveTool()?.selection;
            if (sel?.length > 0) {
               for (const el of sel) {
                 const layer = this.board.layers.find(l => l.id === el.layerId) || this.board.layers[0];
                 const idx = layer.elements.indexOf(el);
                 if (e.key === '[' && idx > 0) {
                   layer.elements.splice(idx, 1);
                   layer.elements.splice(idx - 1, 0, el);
                 } else if (e.key === ']' && idx < layer.elements.length - 1) {
                   layer.elements.splice(idx, 1);
                   layer.elements.splice(idx + 1, 0, el);
                 }
               }
               this.markDirty();
            }
            e.preventDefault();
          }
          if (e.key === 'Delete' || e.key === 'Backspace') {
            const sel = this.toolManager.getActiveTool()?.selection;
            if (sel?.length > 0) {
              this.history.execute(new RemoveElementsCommand(this.board, [...sel]));
              sel.length = 0;
              this.toolManager.getActiveTool().mode = 'idle';
              this.markDirty();
            }
          }
        });

        const endPointer = (e) => {
          if (this.isPanDragging) {
            this.isPanDragging = false;
            this.lastPanPoint = null;
            return;
          }
          
          this.snapLines = []; // Clear snap lines on up
          
          const pt = this.screenToWorld(e.clientX, e.clientY);
          const tool = this.toolManager.getActiveTool();
          if (tool && tool.onPointerUp) {
            tool.onPointerUp(e, pt);
          }
        };

        this.canvas.addEventListener('pointerup', endPointer);
        this.canvas.addEventListener('pointercancel', endPointer);
      }

      updateSelectedProperties(property, value) {
        // Find selection from select tool
        const selTool = this.toolManager.tools['select'];
        if (selTool && selTool.selection && selTool.selection.length > 0) {
           for (const el of selTool.selection) {
             let actualProperty = property;
             
             // Property mapping for specific element types
             if (el.type === 'sticky') {
                 if (property === 'fillColor') actualProperty = 'noteColor';
                 // stickies don't typically change stroke color, but we can allow it
             }
             if (el.type === 'text') {
                 // Text uses strokeColor for text color right now, let's keep it if we want
             }
             
             const before = el[actualProperty];
             const isDiff = Array.isArray(before) && Array.isArray(value) ? JSON.stringify(before) !== JSON.stringify(value) : before !== value;
             if (isDiff) {
               this.history.execute(new ModifyElementCommand(el, actualProperty, before, value));
             }
           }
           this.markDirty();
        } else {
           // If no selection, apply to future shapes by saving in a global state
           this.globalStyle = this.globalStyle || {
             strokeColor: '#6366f1',
             fillColor: 'transparent',
             strokeWidth: 2,
             dashStyle: [],
             opacity: 1
           };
           this.globalStyle[property] = value;
        }
      }

      updateMinimap() {
        const mm = document.getElementById('minimap-canvas');
        const ctx = mm.getContext('2d');
        ctx.clearRect(0, 0, mm.width, mm.height);
        
        const elements = this.board.getAllElements();
        if (elements.length === 0) return;
        
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const el of elements) {
          const bb = el.getBoundingBox();
          if (bb.x < minX) minX = bb.x;
          if (bb.y < minY) minY = bb.y;
          if (bb.x + bb.width > maxX) maxX = bb.x + bb.width;
          if (bb.y + bb.height > maxY) maxY = bb.y + bb.height;
        }
        
        const pad = 100;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const w = maxX - minX; const h = maxY - minY;
        const scale = Math.min(mm.width / w, mm.height / h);
        
        ctx.save();
        ctx.translate(mm.width/2 - (minX + w/2)*scale, mm.height/2 - (minY + h/2)*scale);
        ctx.scale(scale, scale);
        
        // Draw elements simple boxes
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1/scale;
        for (const el of elements) {
          const bb = el.getBoundingBox();
          ctx.fillRect(bb.x, bb.y, bb.width, bb.height);
          ctx.strokeRect(bb.x, bb.y, bb.width, bb.height);
        }
        
        // Draw viewport
        const vw = (this.canvas.width / this.dpr) / this.viewport.zoom;
        const vh = (this.canvas.height / this.dpr) / this.viewport.zoom;
        const vx = -this.viewport.x / this.viewport.zoom;
        const vy = -this.viewport.y / this.viewport.zoom;
        
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2/scale;
        ctx.strokeRect(vx, vy, vw, vh);
        
        ctx.restore();
      }

      spawnTextEditor(screenX, screenY, worldPt, element, isSticky = false, isNew = false) {
         const textarea = document.createElement('textarea');
         textarea.className = 'bg-transparent border-0 outline-none resize-none whitespace-pre-wrap overflow-hidden';
         textarea.style.position = 'fixed'; // Use fixed position to match screenX/Y precisely
         textarea.style.left = screenX + 'px';
         textarea.style.top = screenY + 'px';
         textarea.style.zIndex = '100000';
         
         if (isSticky) {
             textarea.style.transform = 'translate(-50%, -50%)';
             textarea.style.color = '#1f2937';
             textarea.style.fontFamily = 'Inter';
             textarea.style.fontSize = (16 * this.viewport.zoom) + 'px';
             textarea.style.width = Math.max(100 * this.viewport.zoom, element.width * this.viewport.zoom * 0.9) + 'px';
             textarea.style.height = Math.max(100 * this.viewport.zoom, element.height * this.viewport.zoom * 0.9) + 'px';
             textarea.style.textAlign = 'center';
         } else {
             textarea.style.color = element.strokeColor || '#ffffff';
             textarea.style.fontFamily = element.fontFamily || 'Inter';
             textarea.style.fontWeight = element.fontWeight || 400;
             textarea.style.fontStyle = element.fontStyle || 'normal';
             textarea.style.fontSize = (element.fontSize * this.viewport.zoom) + 'px';
             textarea.style.lineHeight = element.lineHeight || 1.5;
             // Ensure line heights and spacing look exactly the same while typing
             textarea.style.padding = '0'; 
             textarea.style.margin = '0';
             
             // Base width on existing bounds if available, otherwise large default to prevent wrapping
             const bb = element.width ? (element.width * this.viewport.zoom) : 2000;
             textarea.style.width = Math.max(300, bb + 50) + 'px'; 
             textarea.style.minHeight = (element.fontSize * this.viewport.zoom * 1.5) + 'px';
             textarea.style.textAlign = element.textAlign || 'left';
         }
         
         textarea.value = element.text || '';
         document.body.appendChild(textarea);
         
         // Auto-expand and contract
         const autoResize = () => {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            if (!isSticky) {
               textarea.style.width = 'auto';
               textarea.style.width = Math.max(50, textarea.scrollWidth + 10) + 'px';
            }
         };
         textarea.addEventListener('input', autoResize);
         autoResize();
         
         // Focus immediately
         setTimeout(() => { textarea.focus(); textarea.setSelectionRange(textarea.value.length, textarea.value.length); }, 10);
         
         let committed = false;
         const commit = () => {
             if (committed) return;
             committed = true;
             const newText = textarea.value.trimEnd(); // Keep leading spaces if they want margins, but trim end
             if (newText) {
                 if (isNew) { // New element
                     element.text = newText;
                     element.x = worldPt.x - (isSticky ? element.width/2 : 0);
                     // the text element calculates its own natural width/height during render
                     element.y = worldPt.y - (isSticky ? element.height/2 : 0);
                     this.history.execute(new AddElementCommand(this.board, element));
                 } else { // Modifying existing
                     if (element.text !== newText) {
                         this.history.execute(new ModifyElementCommand(element, 'text', element.text || '', newText));
                     }
                 }
             } else {
                 if (isNew) {
                     // Cancelled empty create
                 } else {
                     if (element.type === 'text') {
                         // Empty text deletes text elements entirely
                         this.history.execute(new RemoveElementsCommand(this.board, [element]));
                     } else {
                         // Empty text just clears the string on shapes/stickies
                         if (element.text && element.text !== '') {
                             this.history.execute(new ModifyElementCommand(element, 'text', element.text, ''));
                         }
                     }
                 }
             }
             if (textarea.parentNode) textarea.parentNode.removeChild(textarea);
             if (this.toolManager.currentTool === 'text') {
               this.toolManager.setTool('select');
             }
             this.markDirty();
         };
         
         textarea.addEventListener('blur', commit);
         textarea.addEventListener('keydown', (e) => {
             if (e.key === 'Escape') {
               textarea.value = element.text || ''; // Revert on escape
               commit();
             }
             // Shift+Enter for newline, Enter to commit
             if (e.key === 'Enter' && !e.shiftKey) {
                 e.preventDefault();
                 commit();
             }
         });
      }

          document.getElementById('save-status').textContent = 'Saved';

          this.showToast('Failed to auto-save', 'error');

          if (data) {
            this.board.fromJSON(data);
            this.markDirty();
            this.showToast('Board loaded from auto-save', 'success');

      showToast(message, type = 'info') {
         const container = document.getElementById('toast-container');
         const toast = document.createElement('div');
         
         toast.className = 'glass-heavy px-4 py-2 rounded-full text-sm font-medium text-white shadow-lg flex items-center gap-2 transform translate-y-4 opacity-0 transition-all duration-300 pointer-events-auto';
         
         let icon = '';
         if (type === 'success') icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
         else if (type === 'error') icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
         else icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';
         
         toast.innerHTML = `${icon} <span>${message}</span>`;
         container.appendChild(toast);
         
         // Animate in
         requestAnimationFrame(() => {
           toast.classList.remove('translate-y-4', 'opacity-0');
         });
         
         setTimeout(() => {

           setTimeout(() => toast.remove(), 300);
         }, +type === 'error' ? 5000 : 3000);
